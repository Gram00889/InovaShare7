<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>InovaShare</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    input, textarea {
      width: 80%;
      margin: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .produto {
      background: #1e293b;
      margin: 20px;
      padding: 15px;
      border-radius: 15px;
    }

    img {
      width: 100%;
      border-radius: 10px;
    }

    iframe {
      width: 100%;
      height: 200px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>🚀 InovaShare</h1>

<input id="nome" placeholder="Nome do produto"><br>
<textarea id="descricao" placeholder="Descrição"></textarea><br>
<input id="ods" placeholder="ODS"><br>
<input type="file" id="imagem"><br>
<input id="video" placeholder="Link do YouTube"><br>

<button onclick="publicar()">Publicar</button>

<div id="lista"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCC_CJs4diOsCTvLNIxHts2nhiDAm_3yuM",
  authDomain: "inovashare-c1202.firebaseapp.com",
  projectId: "inovashare-c1202",
  storageBucket: "inovashare-c1202.firebasestorage.app",
  messagingSenderId: "627179209490",
  appId: "1:627179209490:web:60ab0c0e3c3c5740cc29cb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.publicar = async function() {

  const file = document.getElementById("imagem").files[0];

  let imagemBase64 = "";

  if (file) {
    const reader = new FileReader();

    imagemBase64 = await new Promise((resolve) => {
      reader.onload = () => resolve(reader.result);
      reader.readAsDataURL(file);
    });
  }

  const produto = {
    nome: document.getElementById("nome").value,
    descricao: document.getElementById("descricao").value,
    ods: document.getElementById("ods").value,
    imagem: imagemBase64,
    video: document.getElementById("video").value
  };

  await addDoc(collection(db, "produtos"), produto);

  alert("Publicado 🔥");

  carregarProdutos();
};

async function carregarProdutos() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "produtos"));

  querySnapshot.forEach((doc) => {
    const p = doc.data();

    let videoEmbed = "";

    if (p.video.includes("youtube")) {
      const id = p.video.split("v=")[1];
      videoEmbed = `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
    }

    lista.innerHTML += `
      <div class="produto">
        <h2>${p.nome}</h2>
        <p>${p.descricao}</p>
        <p>🌍 ${p.ods}</p>
        ${p.imagem ? `<img src="${p.imagem}">` : ""}
        ${videoEmbed}
      </div>
    `;
  });
}

carregarProdutos();

</script>

</body>
</html>
